<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>(MetasequoiaVoiceInput)TrayMenu</title>
  <style>
    body {
      background-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .menu {
      background-color: #2b2b2b;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.2em 0;
      width: 6em;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      user-select: none;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4em 0.4em;
      font-size: 14px;
      color: #e0e0e0;
      border-radius: 6px;
      margin: 1px 6px;
    }

    .menu-item:hover {
      background-color: #3b3b3b;
      color: #fff;
    }

    .menu-item-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>

<body>
  <div class="menu" id="menuContainer">
    <div class="menu-item" id="settings">
      <div class="menu-item-left">
        <span>⚙️</span>
        设置
      </div>
    </div>

    <div class="menu-item" id="about">
      <div class="menu-item-left">
        <span>ℹ️</span>
        关于
      </div>
    </div>

    <div class="menu-item" id="exit">
      <div class="menu-item-left">
        <span>⏹️</span>
        退出
      </div>
    </div>
  </div>

  <script>
    // 设置：向 C++ 端发送消息，打开设置
    const settings = document.getElementById('settings');
    settings.addEventListener('click', () => {
      console.log("settings");
      window.chrome.webview.postMessage("open_settings");
    });

    // 退出：向 C++ 端发送消息，退出程序
    const exit = document.getElementById('exit');
    exit.addEventListener('click', () => {
      console.log("exit");
      window.chrome.webview.postMessage("exit");
    });
  </script>
</body>

</html>
